<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm tra Tin học 8 - Giữa học kỳ II</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --primary-hover: #1d4ed8; --bg-color: #f1f5f9; --surface: #ffffff; --text-main: #0f172a; --border: #cbd5e1; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; line-height: 1.6; }
        .exam-layout { max-width: 1100px; margin: 0 auto; display: flex; gap: 20px; }
        .exam-main { flex: 1; }
        .exam-sidebar { width: 300px; position: sticky; top: 20px; height: fit-content; }
        
        /* Header style */
        .classic-header { background: white; border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .header-info h2 { margin: 0; color: var(--primary); font-size: 20px; }
        
        /* Question cards */
        .section-title { background: var(--primary); color: white; padding: 10px 20px; border-radius: 6px; margin: 20px 0; font-weight: bold; text-transform: uppercase; }
        .question-card { background: white; padding: 20px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 15px; transition: all 0.3s; }
        .question-card:hover { border-color: var(--primary); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .q-text { font-weight: 600; margin-bottom: 15px; }
        .q-text span { color: var(--primary); margin-right: 5px; }
        
        /* Options */
        .options-grid { display: grid; gap: 10px; }
        .option-item { display: flex; align-items: center; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; }
        .option-item:hover { background: #f8fafc; }
        .option-item input { margin-right: 10px; cursor: pointer; }

        /* Essay box */
        .essay-input { width: 100%; min-height: 150px; border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-family: inherit; resize: vertical; }

        /* Sidebar components */
        .sidebar-card { background: white; padding: 20px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
        .timer { font-size: 32px; font-weight: bold; text-align: center; color: var(--danger); font-family: monospace; }
        .palette { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .pal-item { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .pal-item.done { background: var(--primary); color: white; border-color: var(--primary); }
        
        .btn-submit { width: 100%; background: var(--success); color: white; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-submit:hover { opacity: 0.9; }

        @media (max-width: 768px) { .exam-layout { flex-direction: column; } .exam-sidebar { width: 100%; position: static; } }
    </style>
</head>
<body>

<div class="exam-layout">
    <div class="exam-main">
        <div class="classic-header">
            <div class="header-info">
                <h2>KIỂM TRA GIỮA HỌC KỲ II</h2>
                <div>Môn: Tin học 8 | Năm học: 2023 - 2024</div>
            </div>
            <div style="text-align: right; font-style: italic;">
                Thời gian: 45 phút
            </div>
        </div>

        <div class="section-title">Phần I: Trắc nghiệm (3.0 điểm)</div>
        <div id="mcq-container"></div>

        <div class="section-title">Phần II: Tự luận (7.0 điểm)</div>
        <div id="essay-container"></div>
    </div>

    <div class="exam-sidebar">
        <div class="sidebar-card">
            <div style="text-align:center; font-size:14px; color:#64748b; margin-bottom:5px;">Thời gian còn lại</div>
            <div class="timer" id="timer">45:00</div>
        </div>

        <div class="sidebar-card">
            <div style="font-weight:bold; margin-bottom:15px;"><i class="fa-solid fa-th"></i> Danh sách câu hỏi</div>
            <div class="palette" id="palette"></div>
        </div>

        <button class="btn-submit" onclick="submitExam()">NỘP BÀI THI</button>
    </div>
</div>

<script>
    const mcqs = [
        { q: "Đầu trang (Header) và chân trang (Footer) là vị trí nào của văn bản?", a: ["Phần nội dung chính", "Phần lề trên và lề dưới của trang", "Chỉ ở trang đầu tiên", "Phần chứa hình ảnh"], c: 1 },
        { q: "Trong phần mềm trình chiếu, để đánh số trang ta sử dụng lệnh nào?", a: ["Insert / Slide Number", "Home / Numbering", "Design / Slide Size", "View / Notes Master"], c: 0 },
        { q: "Bản mẫu (Template) trong phần mềm trình chiếu là gì?", a: ["Một tệp văn bản", "Bản thiết kế sẵn gồm bố cục, màu sắc, phông chữ", "Một hình ảnh nền", "Một video hướng dẫn"], c: 1 },
        { q: "Lợi ích của việc sử dụng bản mẫu có sẵn là gì?", a: ["Không cần viết nội dung", "Tạo sự thống nhất và chuyên nghiệp nhanh chóng", "Làm máy tính chạy nhanh hơn", "Chống virus"], c: 1 },
        { q: "Nhóm màu nóng (Đỏ, Cam, Vàng) mang lại cảm giác gì?", a: ["Lạnh lẽo", "Ấm áp, phấn chấn, gây chú ý", "Buồn bã", "Yên tĩnh"], c: 1 },
        { q: "Thuật toán là gì?", a: ["Một dãy các bước để giải quyết vấn đề", "Một linh kiện máy tính", "Một ngôn ngữ lập trình", "Một trang web"], c: 0 },
        { q: "Để vẽ tam giác đều trong Scratch, nhân vật cần quay một góc bao nhiêu độ?", a: ["60 độ", "90 độ", "120 độ", "180 độ"], c: 2 },
        { q: "Kiểu dữ liệu Logic gồm những giá trị nào?", a: ["0 đến 9", "True và False", "Chữ cái A-Z", "Số thập phân"], c: 1 },
        { q: "Biến (Variable) dùng để làm gì trong chương trình?", a: ["Đổi màu nhân vật", "Lưu trữ giá trị có thể thay đổi", "Phát âm thanh", "Kết thúc chương trình"], c: 1 },
        { q: "Kết quả của phép so sánh '10 < 7' là gì?", a: ["True", "False", "3", "17"], c: 1 },
        { q: "Trong Scratch, để thực hiện lặp lại một hành động nhiều lần ta dùng nhóm lệnh nào?", a: ["Chuyển động", "Sự kiện", "Điều khiển", "Các phép toán"], c: 2 },
        { q: "Độ tương phản giữa màu chữ và màu nền trang chiếu có tác dụng gì?", a: ["Làm trang chiếu đẹp hơn", "Giúp người nghe dễ đọc nội dung", "Tiết kiệm mực in", "Giảm dung lượng file"], c: 1 }
    ];

    const essays = [
        "Em hãy nêu ít nhất 4 nguyên tắc lựa chọn màu sắc phù hợp khi thiết kế trang chiếu để đảm bảo tính thẩm mỹ và dễ đọc.",
        "Mô tả thuật toán bằng sơ đồ khối hoặc các bước liệt kê để nhân vật Scratch vẽ được một hình vuông có cạnh 100 bước."
    ];

    // Render Trắc nghiệm
    const mcqBox = document.getElementById('mcq-container');
    const palBox = document.getElementById('palette');
    mcqs.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'question-card';
        div.id = `q-mcq-${i}`;
        div.innerHTML = `
            <div class="q-text"><span>Câu ${i+1}:</span> ${item.q}</div>
            <div class="options-grid">
                ${item.a.map((opt, idx) => `
                    <label class="option-item">
                        <input type="radio" name="q${i}" onchange="markDone(${i})">
                        ${String.fromCharCode(65+idx)}. ${opt}
                    </label>
                `).join('')}
            </div>
        `;
        mcqBox.appendChild(div);
        
        const pBtn = document.createElement('div');
        pBtn.className = 'pal-item';
        pBtn.id = `pal-${i}`;
        pBtn.innerText = i + 1;
        pBtn.onclick = () => div.scrollIntoView({behavior: "smooth", block: "center"});
        palBox.appendChild(pBtn);
    });

    // Render Tự luận
    const essayBox = document.getElementById('essay-container');
    essays.forEach((item, i) => {
        const idx = mcqs.length + i;
        const div = document.createElement('div');
        div.className = 'question-card';
        div.innerHTML = `
            <div class="q-text"><span>Câu ${idx+1}:</span> ${item}</div>
            <textarea class="essay-input" placeholder="Nhập câu trả lời của em tại đây..." oninput="markDone(${idx})"></textarea>
        `;
        essayBox.appendChild(div);

        const pBtn = document.createElement('div');
        pBtn.className = 'pal-item';
        pBtn.id = `pal-${idx}`;
        pBtn.innerText = idx + 1;
        pBtn.onclick = () => div.scrollIntoView({behavior: "smooth", block: "center"});
        palBox.appendChild(pBtn);
    });

    function markDone(id) {
        document.getElementById(`pal-${id}`).classList.add('done');
    }

    // Timer
    let time = 45 * 60;
    const timerEl = document.getElementById('timer');
    const countdown = setInterval(() => {
        time--;
        let m = Math.floor(time / 60);
        let s = time % 60;
        timerEl.innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        if (time <= 0) {
            clearInterval(countdown);
            submitExam();
        }
    }, 1000);

    function submitExam() {
        alert("Cảm ơn em đã hoàn thành bài thi! Kết quả của em đã được gửi lên hệ thống.");
        window.location.reload();
    }
</script>

</body>
</html>
