<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đề kiểm tra cuối học kỳ II - Tin học 8</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --primary-hover: #1d4ed8; --bg-color: #f1f5f9; --surface: #ffffff; --text-main: #0f172a; --border: #cbd5e1; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; line-height: 1.6; }
        .exam-layout { max-width: 1000px; margin: 0 auto; display: flex; gap: 25px; }
        .exam-main { flex: 1; }
        .exam-sidebar { width: 280px; position: sticky; top: 20px; height: fit-content; }
        .section-header { background: var(--primary); color: white; padding: 12px 20px; border-radius: 8px; margin: 30px 0 20px; font-weight: bold; text-transform: uppercase; }
        .question-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .question-title { font-weight: bold; margin-bottom: 15px; color: var(--primary); }
        
        /* MCQ Styles */
        .mcq-options { display: grid; gap: 10px; }
        .mcq-option { display: flex; align-items: center; padding: 10px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; }
        .mcq-option:hover { background: #f8fafc; }
        .mcq-option input { margin-right: 10px; }

        /* True/False Table Styles */
        .tf-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        .tf-table th, .tf-table td { border: 1px solid var(--border); padding: 10px; text-align: center; }
        .tf-table td:nth-child(2) { text-align: left; }
        
        /* Sidebar Styles */
        .sidebar-box { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .timer { font-size: 28px; font-weight: bold; text-align: center; color: var(--danger); }
        .btn-submit { width: 100%; padding: 15px; background: var(--success); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .essay-input { width: 100%; min-height: 100px; border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="exam-layout">
    <div class="exam-main">
        <div style="background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-bottom: 4px solid var(--primary);">
            <h1 style="margin: 0; font-size: 22px;">ÔN TẬP KIỂM TRA CUỐI HỌC KỲ II - TIN HỌC 8</h1>
            <p>Nội dung: Excel nâng cao & Microsoft 365</p>
        </div>

        <div class="section-header">I. PHẦN TRẮC NGHIỆM (3,0 ĐIỂM)</div>
        <div id="mcq-container"></div>

        <div class="section-header">II. TRẮC NGHIỆM ĐÚNG/SAI (4,0 ĐIỂM)</div>
        <div id="tf-container"></div>

        <div class="section-header">III. PHẦN TỰ LUẬN (3,0 ĐIỂM)</div>
        <div id="essay-container"></div>
    </div>

    <div class="exam-sidebar">
        <div class="sidebar-box">
            <div style="text-align: center; color: #64748b; font-size: 14px;">THỜI GIAN LÀM BÀI</div>
            <div class="timer" id="timer">45:00</div>
        </div>
        <button class="btn-submit" onclick="submitExam()">NỘP BÀI</button>
    </div>
</div>

<script>
    const mcqData = [
        { q: "Hàm COUNTIF được sử dụng để làm gì?", options: ["Đếm các ô trống trong một vùng dữ liệu", "Đếm các ô có dữ liệu thỏa mãn một điều kiện cụ thể", "Cộng tất cả các số trong một vùng dữ liệu", "Sắp xếp dữ liệu trong một bảng tính"], correct: 1 },
        { q: "Trong công thức chung của COUNTIF, tham số criteria có ý nghĩa gì?", options: ["Phạm vi chứa các ô tính cần kiểm tra để đếm", "Điều kiện kiểm tra các ô tính trong phạm vi range", "Phạm vi chứa các giá trị không hợp lệ", "Điều kiện xác thực dữ liệu để tạo bảng tính"], correct: 1 },
        { q: "Để đếm các ô có giá trị bằng hoặc lớn hơn 1000, công thức đúng là:", options: ["=COUNTIF(A1:A10,\">=1000\")", "=COUNTIF(A1:A10,\">1000\")", "=COUNTIF(A1:A10,\"=<1000\")", "=COUNTIF(A1:A10,\">1000=\")"], correct: 0 },
        { q: "Hàm =SUMIF(A2:A10, \"Lương\", B2:B10) sẽ làm gì?", options: ["Tính tổng các ô trong cột A có giá trị là \"Lương\"", "Tính tổng các ô trong cột B tương ứng với các ô trong cột A có giá trị là \"Lương\"", "Đếm số ô trong cột B có giá trị là \"Lương\"", "Đếm số ô trong cột A có giá trị là \"Lương\""], correct: 1 },
        { q: "Để tính tổng các số âm trong phạm vi B1:B20, ta sử dụng công thức nào?", options: ["=SUMIF(B1:B20, \"=0\", B1:B20)", "=SUMIF(B1:B20, \"<=0\")", "=SUMIF(B1:B20, \"<0\", B1:B20)", "=SUMIF(B1:B20, \">0\", B1:B20)"], correct: 2 },
        { q: "Hàm nào sau đây dùng để trích xuất giá trị tháng từ dữ liệu kiểu ngày?", options: ["YEAR", "DAY", "MONTH", "DATE"], correct: 2 },
        { q: "Để lấy dữ liệu từ một trang tính khác trong Excel, cần thêm ký tự nào vào trước địa chỉ ô tính?", options: ["#", "$", "@", "!"], correct: 3 },
        { q: "Công thức =IF(C3>B3,\"Chi>Thu\",\"Chi<=Thu\") trả về giá trị gì nếu C3 = 5000 và B3 = 3000?", options: ["Chi>Thu", "Chi<=Thu", "Chi=Thu", "Không giá trị nào"], correct: 0 },
        { q: "Biểu đồ Pie (Bđ Tròn) thường được sử dụng để:", options: ["So sánh tổng giá trị của các danh mục", "Thể hiện sự thay đổi của dữ liệu theo thời gian", "Hiển thị tỉ lệ phần trăm của từng danh mục so với tổng thể", "Hiển thị các giá trị lớn nhất và nhỏ nhất"], correct: 2 },
        { q: "Tại sao trực quan hóa dữ liệu là quan trọng trong phân tích tài chính?", options: ["Giúp nhận diện nhanh các xu hướng", "Giảm sai sót khi tính toán", "Tăng tốc độ nhập dữ liệu", "Giúp bảo vệ dữ liệu khỏi bị mất"], correct: 0 },
        { q: "Em hãy cho biết chức năng chính của Microsoft Forms là gì?", options: ["Là ứng dụng lập kế hoạch và quản lý công việc", "Là ứng dụng thiết kế bài thuyết trình trực quan", "Là ứng dụng ghi chú kỹ thuật số", "Là công cụ cho phép tạo biểu mẫu, khảo sát hoặc bài kiểm tra"], correct: 3 },
        { q: "Tạo nhiệm vụ trong Microsoft Planner, em chọn mục nào?", options: ["Add Assign", "Add Progress", "Add task", "Add new bucket"], correct: 2 }
    ];

    const tfData = [
        { q: "Câu 13: Một cửa hàng giày thể thao quản lý dữ liệu bằng COUNTIF:", subs: ["Hàm COUNTIF không thể sử dụng để đếm số lượng kích thước giày.", "Hàm COUNTIF chỉ đếm được các số nguyên.", "Để đếm số đôi giày size 39, ta dùng: =COUNTIF(B4:B8, \"39\").", "Để đếm giày có màu khác Be, ta dùng công thức =COUNTIF(D4:D8, \"Be\")."] },
        { q: "Câu 14: Bạn Minh quản lý cửa hàng thể thao bằng hàm SUMIF:", subs: ["Hàm SUMIF không thể sử dụng để phân tích xu hướng doanh số.", "Hàm SUMIF giúp Minh tính tổng doanh thu theo điều kiện.", "Tính tổng \"Giày thể thao\": =SUMIF(B4:B8, \"Giày thể thao\", D4:D8).", "Tính tổng sản phẩm giá > 500k: =SUMIF(D2:D100, \">500000\", E2:E100)."] },
        { q: "Câu 15: Đánh giá tính đúng đắn khi sử dụng hàm IF để xếp loại học sinh:", subs: ["Hàm IF có thể dùng để xếp loại học sinh dựa vào điểm trung bình.", "Công thức =IF(C4>=8,\"Giỏi\",\"Khá\") phân loại được 4 mức Xuất sắc, Giỏi, Khá, TB.", "Muốn phân loại nhiều mức, cần sử dụng hàm IF lồng nhau.", "Công thức IF lồng nhau đúng chuẩn phải xét từ mức cao nhất xuống thấp dần."] },
        { q: "Câu 16: Sử dụng các ứng dụng của Microsoft 365:", subs: ["Microsoft Sway là ứng dụng thiết kế báo cáo, câu chuyện cá nhân.", "Công cụ Microsoft Forms không thể thiết đặt ngày, giờ nhận phản hồi.", "Microsoft Planner không cho phép theo dõi tiến độ công việc.", "Trên Microsoft Sway, để thay đổi kiểu ta vào Design / Styles."] }
    ];

    const essayData = [
        "Câu 17: Dựa vào bảng 'Quan li chi tieu ca nhan.xlsx': \n a) Nêu cách tính số lần chi và tổng tiền? \n b) Viết công thức hàm IF vào cột cân đối (Nếu Tổng tiền > 3.000.000 thì 'Vượt mức', ngược lại 'Hợp lí')?",
        "Câu 18: Em hãy trình bày cách trực quan hoá dữ liệu danh sách các khoản chi và tổng tiền bằng biểu đồ? Cần định dạng những thành phần nào để biểu đồ rõ ràng hơn?"
    ];

    // Khởi tạo giao diện
    function init() {
        // MCQ
        let mcqHTML = "";
        mcqData.forEach((item, i) => {
            mcqHTML += `<div class="question-card">
                <div class="question-title">Câu ${i+1}. ${item.q}</div>
                <div class="mcq-options">
                    ${item.options.map((opt, idx) => `
                        <label class="mcq-option">
                            <input type="radio" name="mcq_${i}"> ${String.fromCharCode(65+idx)}. ${opt}
                        </label>
                    `).join('')}
                </div>
            </div>`;
        });
        document.getElementById('mcq-container').innerHTML = mcqHTML;

        // True/False
        let tfHTML = "";
        tfData.forEach((item, i) => {
            tfHTML += `<div class="question-card">
                <div class="question-title">${item.q}</div>
                <table class="tf-table">
                    <thead><tr><th>Ý</th><th>Nội dung nhận định</th><th>Đúng</th><th>Sai</th></tr></thead>
                    <tbody>
                        ${item.subs.map((sub, idx) => `
                            <tr>
                                <td>${String.fromCharCode(97+idx)}</td>
                                <td>${sub}</td>
                                <td><input type="radio" name="tf_${i}_${idx}"></td>
                                <td><input type="radio" name="tf_${i}_${idx}"></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>`;
        });
        document.getElementById('tf-container').innerHTML = tfHTML;

        // Essay
        let essayHTML = "";
        essayData.forEach((item, i) => {
            essayHTML += `<div class="question-card">
                <div class="question-title">${item}</div>
                <textarea class="essay-input" placeholder="Nhập câu trả lời của em tại đây..."></textarea>
            </div>`;
        });
        document.getElementById('essay-container').innerHTML = essayHTML;
    }

    // Đếm ngược thời gian
    let time = 45 * 60;
    setInterval(() => {
        if (time > 0) {
            time--;
            let m = Math.floor(time / 60);
            let s = time % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' + s : s}`;
        }
    }, 1000);

    function submitExam() {
        alert("Chúc mừng em đã hoàn thành bài ôn tập! Hãy kiểm tra lại các công thức Excel trước khi kết thúc.");
    }

    window.onload = init;
</script>
</body>
</html>
